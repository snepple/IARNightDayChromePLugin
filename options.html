<!DOCTYPE html>
<html>
<head>
  <title>IamResponding Auto Theme & Login Options</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      padding: 20px;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background-color: #ffffff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }
    h2 {
      margin-top: 0;
      color: #333;
      text-align: center;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      color: #666;
      font-weight: bold;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }
    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #007bff;
      outline: none;
      box-shadow: 0 0 5px rgba(0, 123, 255, 0.2);
    }
    .button-group {
      display: flex;
      justify-content: flex-end;
      margin-top: 20px;
    }
    button {
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #0056b3;
    }
    #status {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
      min-height: 20px;
      color: green;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #status.show {
      opacity: 1;
    }
    .alert {
      background-color: #f8d7da;
      color: #721c24;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 20px;
      font-size: 14px;
      border: 1px solid #f5c6cb;
    }
    .alert a {
      color: #721c24;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Auto-Login Settings</h2>

    <div class="alert">
      By using this extension, you are agreeing to IAmResponding's Cookie Policy, which will be auto-accepted. If you wish to view the policy, you can visit <a target="_blank" href="https://iamresponding.com">https://iamresponding.com</a>.
    </div>

    <form id="options-form">
      <div class="form-group">
        <label style="display: flex; align-items: center; gap: 8px;">
          <input type="checkbox" id="hideRespondNow" name="hideRespondNow" style="width: auto;">
          Hide "Respond Now" Button
        </label>
      </div>
      <div class="form-group">
        <label for="agency">Agency Name</label>
        <input type="text" id="agency" name="agency" placeholder="Enter Agency" required>
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter Username" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter Password" required>
      </div>

      <div class="button-group">
        <button type="submit" id="save">Save</button>
      </div>
    </form>
    <div id="status">Options saved!</div>
  </div>
  <script type="module" src="options.js"></script>
</body>
</html>
